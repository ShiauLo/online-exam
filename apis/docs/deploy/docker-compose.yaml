name: ${COMPOSE_PROJECT_NAME:-online-exam-infra}

services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_ROOT_HOST: ${MYSQL_ROOT_HOST:-%}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-online_exam_db}
      TZ: ${TZ:-Asia/Shanghai}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../sql/mysql.sql:/docker-entrypoint-initdb.d/10-online-exam.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    networks:
      - backend

  redis:
    image: redis:6.2.6
    container_name: redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      TZ: ${TZ:-Asia/Shanghai}
    command:
      - sh
      - -c
      - redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - backend

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_DEFAULT_VHOST:-/online-exam}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:${RABBITMQ_PORT:-5672}:5672"
      - "${HOST_BIND_IP:-127.0.0.1}:${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - backend

  nacos:
    image: nacos/nacos-server:v3.0.3
    container_name: nacos
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: ${NACOS_MYSQL_DATABASE:-nacos_config}
      MYSQL_SERVICE_USER: ${NACOS_MYSQL_USER:-root}
      MYSQL_SERVICE_PASSWORD: ${NACOS_MYSQL_PASSWORD}
      MYSQL_SERVICE_DB_PARAM: ${NACOS_MYSQL_DB_PARAM:-characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN}
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE}
      JVM_XMS: ${NACOS_JVM_XMS:-256m}
      JVM_XMX: ${NACOS_JVM_XMX:-256m}
      JVM_XMN: ${NACOS_JVM_XMN:-128m}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:${NACOS_PORT:-8848}:8848"
      - "${HOST_BIND_IP:-127.0.0.1}:${NACOS_RAFT_PORT:-9848}:9848"
      - "${HOST_BIND_IP:-127.0.0.1}:${NACOS_GRPC_PORT:-9849}:9849"
    volumes:
      - nacos_logs:/home/nacos/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8848/nacos/ > /dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s
    networks:
      - backend

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  nacos_logs:

networks:
  backend:
    driver: bridge
