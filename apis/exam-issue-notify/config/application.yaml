app:
  name: exam-issue-notify
  profiles: dev,local

server:
  host: 0.0.0.0
  port: 8091
  socketPath: /socket.io
  corsOrigins: "*"

mysql:
  host: 127.0.0.1
  port: 3306
  database: online_exam_db
  user: ${EXAM_DB_USERNAME}
  password: ${EXAM_DB_PASSWORD}
  poolSize: 10

nacos:
  enabled: true
  serverAddr: ${EXAM_NACOS_ADDR}
  username: ${EXAM_NACOS_USERNAME}
  password: ${EXAM_NACOS_PASSWORD}
  namespace: public
  group: DEFAULT_GROUP
  serviceIp: ${EXAM_ISSUE_NOTIFY_IP}
  servicePort: ${EXAM_ISSUE_NOTIFY_PORT}
  heartbeatIntervalMs: 5000

jwt:
  secret: ${EXAM_JWT_SECRET}

notify:
  defaultLimit: 20
  maxLimit: 100
  pollIntervalMs: 3000
  historyLookbackMinutes: 1440
